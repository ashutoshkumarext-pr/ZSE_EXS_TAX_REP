# yaml-language-server: $schema=https://sap.github.io/ui5-tooling/schema/ui5.yaml.json

specVersion: "4.0"
metadata:
  name: leap.mm.im.se.exs.tax.rep
type: application
builder:
  resources:
    excludes:
      - /test/**
      - /localService/**
  customTasks:
    - name: deploy-to-abap
      afterTask: generateCachebusterInfo
      configuration:
        target:
          destination: S4DEV
          url: http://s4devwdpp.sap.pernod-ricard.app:443
          client: '100'
        app:
          name: ZSE_EXS_TAX_REP
          description: SE Excise Tax Report-Skatteupplag
          package: ZCECRIT_MM_IM_UI5_CUST
          transport: DR1K904224
        exclude:
          - /test/
